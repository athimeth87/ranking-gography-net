<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<title>Gography Photo Awards — Ranking</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #ffffff;
    --fg: #000000;
    --fg-soft: rgba(0,0,0,.55);
    --fg-faint: rgba(0,0,0,.32);
    --rule: rgba(0,0,0,.12);
    --rule-strong: rgba(0,0,0,.85);
    --cream: #FAFAF7;
    --tile: #f1efe9;
    --sans: 'Inter', 'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif;
    --thai: 'Noto Sans Thai', 'Inter', 'Helvetica Neue', sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
  }
  [data-theme="dark"] {
    --bg: #000000;
    --fg: #ffffff;
    --fg-soft: rgba(255,255,255,.6);
    --fg-faint: rgba(255,255,255,.32);
    --rule: rgba(255,255,255,.14);
    --rule-strong: rgba(255,255,255,.85);
    --cream: #0d0c0a;
    --tile: #131210;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background-color .25s ease, color .25s ease;
  }

  /* Thai text helper */
  .th { font-family: var(--thai); }

  /* utility */
  .mono { font-family: var(--mono); }
  .caps { text-transform: uppercase; letter-spacing: .14em; font-size: 11px; font-weight: 500; }
  .rule-top { border-top: 1px solid var(--rule); }
  .rule-bot { border-bottom: 1px solid var(--rule); }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  img { display: block; max-width: 100%; }

  /* page width */
  .wrap { max-width: 1360px; margin: 0 auto; padding: 0 40px; }
  .wrap-narrow { max-width: 880px; margin: 0 auto; padding: 0 40px; }

  /* nav */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in oklab, var(--bg) 92%, transparent);
    backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--rule);
  }
  .nav-inner {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 24px;
    padding: 18px 40px;
  }
  .nav-left { display: flex; gap: 28px; align-items: center; }
  .nav-right { display: flex; gap: 24px; align-items: center; justify-content: flex-end; }
  .nav a.nav-link { font-size: 12.5px; letter-spacing: .12em; text-transform: uppercase; opacity: .82; }
  .nav a.nav-link:hover { opacity: 1; }
  .nav a.nav-link.active { opacity: 1; border-bottom: 1px solid var(--fg); padding-bottom: 4px; }
  .logo {
    font-weight: 600; font-size: 17px; letter-spacing: .02em;
    display: flex; align-items: center; gap: 10px;
  }
  .logo .mark {
    width: 24px; height: 24px; border-radius: 50%;
    border: 1.5px solid var(--fg);
    display: grid; place-items: center; font-size: 10px; font-weight: 700; letter-spacing: 0;
  }
  .logo small { font-weight: 400; opacity: .55; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 13px 22px;
    border: 1px solid var(--fg); color: var(--fg);
    font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    transition: background .18s ease, color .18s ease;
    cursor: pointer; font-weight: 500;
  }
  .btn:hover { background: var(--fg); color: var(--bg); }
  .btn-solid { background: var(--fg); color: var(--bg); }
  .btn-solid:hover { background: transparent; color: var(--fg); }
  .btn-ghost { border-color: var(--rule); }
  .btn-sm { padding: 9px 14px; font-size: 11px; }

  /* hero placeholder image */
  .ph {
    background: var(--tile);
    position: relative;
    overflow: hidden;
  }
  .ph::after {
    content: attr(data-label);
    position: absolute; inset: auto 12px 10px 12px;
    font-family: var(--mono); font-size: 10px; letter-spacing: .08em;
    color: var(--fg-faint); text-transform: uppercase;
  }

  /* photo card */
  .pcard { position: relative; cursor: pointer; }
  .pcard .pimg {
    width: 100%; aspect-ratio: 4/5; background: var(--tile); overflow: hidden;
    position: relative;
  }
  .pcard .pimg img { width: 100%; height: 100%; object-fit: cover; transition: transform .6s ease; }
  .pcard:hover .pimg img { transform: scale(1.025); }
  .pcard .pmeta {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 12px 2px 4px 2px;
    border-top: 1px solid var(--rule);
    margin-top: 0;
  }
  .pcard .ptitle { font-size: 14px; font-weight: 500; letter-spacing: -.005em; }
  .pcard .pby { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-soft); margin-top: 3px; }

  /* pulse number badge */
  .pulse {
    font-family: var(--mono);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    letter-spacing: -.01em;
    display: inline-flex; align-items: baseline; gap: 4px;
  }
  .pulse .big { font-size: 22px; line-height: 1; }
  .pulse .lab { font-size: 9px; letter-spacing: .18em; text-transform: uppercase; opacity: .55; align-self: center; }
  .pulse-tag {
    display: inline-flex; align-items: baseline; gap: 6px;
    font-family: var(--mono); font-size: 11px;
    padding: 4px 8px; border: 1px solid var(--rule);
    background: var(--cream);
    line-height: 1; min-height: 22px;
  }
  .pulse-tag .arrow { font-size: 10px; }
  .pulse-tag .arrow.up { color: var(--fg); }
  .pulse-tag .arrow.down { color: var(--fg-soft); }

  /* rank pill */
  .rank {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    border: 1px solid var(--fg);
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  /* curator badge */
  .pick {
    display: inline-block;
    padding: 3px 7px;
    border: 1px solid var(--fg);
    font-size: 9.5px; letter-spacing: .18em; text-transform: uppercase;
    font-weight: 500;
  }
  .pick.solid { background: var(--fg); color: var(--bg); }

  /* footer */
  footer {
    margin-top: 120px;
    border-top: 1px solid var(--rule);
    padding: 64px 0 40px;
    font-size: 13px;
  }
  footer .fgrid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 40px; align-items: start; }
  footer h6 { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; font-weight: 500; margin: 0 0 18px; opacity: .55; }
  footer ul { list-style: none; margin: 0; padding: 0; }
  footer li { margin-bottom: 10px; font-size: 13px; }
  footer li a:hover { opacity: .6; }
  footer .colophon { display: flex; justify-content: space-between; align-items: center; margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--rule); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-soft); }

  /* like btn */
  .heart {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--rule); padding: 8px 12px;
    font-family: var(--mono); font-size: 12px;
    transition: background .15s ease;
  }
  .heart:hover { border-color: var(--fg); }
  .heart.on { background: var(--fg); color: var(--bg); border-color: var(--fg); }
  .heart svg { width: 13px; height: 13px; }

  /* lightbox */
  .lbox-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 200; display: grid; place-items: center;
    animation: fade .2s ease;
  }
  [data-theme="dark"] .lbox-overlay { background: rgba(0,0,0,.96); }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  /* page transitions */
  .page-fade { animation: pgfade .35s ease; }
  @keyframes pgfade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* form/input */
  .input {
    width: 100%; padding: 14px 16px;
    border: 1px solid var(--rule);
    background: transparent; color: var(--fg);
    font: inherit; font-size: 14px;
  }
  .input:focus { outline: none; border-color: var(--fg); }

  /* ============ EDITORIAL MODE OVERRIDES ============ */
  [data-mode="editorial"] {
    --display-weight: 700;
  }
  [data-mode="editorial"] .display-hero {
    font-weight: 700;
    letter-spacing: -.04em;
    line-height: .88;
  }
  [data-mode="editorial"] .magrule {
    display: block; border-top: 2px solid var(--fg);
  }
  [data-mode="atelier"] .magrule {
    display: block; border-top: 1px solid var(--rule);
  }
  [data-mode="atelier"] .display-hero {
    font-weight: 400;
    letter-spacing: -.02em;
    line-height: 1.02;
  }
  [data-mode="editorial"] .editorial-only { display: block; }
  [data-mode="atelier"] .editorial-only { display: none; }
  [data-mode="editorial"] .atelier-only { display: none; }
  [data-mode="atelier"] .atelier-only { display: block; }
  [data-mode="editorial"] .editorial-only-inline { display: inline; }
  [data-mode="atelier"] .editorial-only-inline { display: none; }

  /* section header */
  .section-h {
    display: flex; align-items: end; justify-content: space-between;
    padding-bottom: 28px; margin-bottom: 28px;
    border-bottom: 1px solid var(--rule);
  }
  [data-mode="editorial"] .section-h { border-bottom-color: var(--fg); border-bottom-width: 2px; }
  .section-h h2 {
    font-size: 48px; font-weight: 400; letter-spacing: -.025em;
    margin: 0; line-height: 1;
  }
  [data-mode="editorial"] .section-h h2 { font-weight: 700; font-size: 56px; letter-spacing: -.035em; }

  /* card variants */
  .crm { background: var(--cream); }

  /* design note badge */
  .dnote {
    position: fixed; bottom: 18px; left: 18px;
    z-index: 60;
    font-family: var(--mono); font-size: 11px;
    border: 1px solid var(--rule);
    background: var(--bg); padding: 8px 12px;
    display: flex; align-items: center; gap: 8px;
    user-select: none;
  }
  .dnote .dot { width: 6px; height: 6px; background: var(--fg); border-radius: 50%; }

  /* loading skeleton */
  .skel { background: linear-gradient(90deg, var(--tile) 0%, color-mix(in oklab, var(--tile) 60%, var(--bg)) 50%, var(--tile) 100%); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* curation pick badge — circle expands to pill on hover */
  .pickbadge { cursor: default; }
  .pickbadge:hover .pickbadge-label { max-width: 240px; padding-right: 14px; }
  .pcard:hover .pickbadge .pickbadge-label { max-width: 240px; padding-right: 14px; }

  /* picsum sometimes 503s on first hit; retry once on error */
</style>

<script>
  // Global one-shot retry for any IMG that fails to load (picsum rate-limits new seeds)
  document.addEventListener('error', function(e) {
    var t = e.target;
    if (t && t.tagName === 'IMG' && !t.dataset.retried && t.src.indexOf('picsum.photos') > -1) {
      t.dataset.retried = '1';
      var s = t.src;
      t.src = '';
      setTimeout(function() { t.src = s; }, 400 + Math.random() * 600);
    }
  }, true);
</script>
